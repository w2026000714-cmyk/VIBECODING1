!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기사여행 (Knight's Tour)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f3ee; padding: 20px; color: #222; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  p.sub { font-size: 13px; color: #666; margin-bottom: 16px; }

  /* ── 보드 크기 선택 ── */
  .size-selector { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .size-btn {
    padding: 5px 14px; font-size: 12px; border-radius: 8px;
    border: 1px solid #ccc; background: transparent; cursor: pointer;
  }
  .size-btn.active { background: #378ADD; color: #fff; border-color: #378ADD; }

  /* ── 힌트 토글 ── */
  #kt-hint-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; color: #555; }

  /* ── 통계 카드 ── */
  .kt-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; max-width: 420px; }
  .kt-stat { background: #ece9e0; border-radius: 8px; padding: 10px 12px; }
  .kt-stat .lbl { font-size: 12px; color: #777; margin-bottom: 2px; }
  .kt-stat .val { font-size: 20px; font-weight: 500; }

  /* ── 레이아웃 ── */
  #kt-board-wrap { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }

  /* ── 보드 ── */
  #kt-board { display: grid; gap: 2px; flex: 0 0 auto; }
  .kt-cell {
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; position: relative;
    transition: transform 0.1s;
    user-select: none;
  }
  .kt-cell:hover { transform: scale(1.05); }
  .kt-cell.light   { background: #e8dcc8; }
  .kt-cell.dark    { background: #b08050; }
  .kt-cell.visited { background: #5DCAA5 !important; }
  .kt-cell.current { background: #378ADD !important; }
  .kt-cell.hint    { background: #FAC775 !important; cursor: pointer; }
  .kt-cell.hint:hover { background: #EF9F27 !important; }

  /* 방문 순서 번호 (좌상단) */
  .kt-num {
    position: absolute; top: 4px; left: 6px;
    font-size: 11px; color: rgba(0,0,0,0.45);
  }
  /* 나이트 말 */
  .kt-knight { font-size: 30px; line-height: 1; }

  /* ── 사이드패널 ── */
  .kt-side { min-width: 180px; }
  .kt-side h3 { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
  .kt-legend { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .kt-leg { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
  .kt-swatch { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; }
